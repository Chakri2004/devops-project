apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: chakri9604/product-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5002

          livenessProbe:
            httpGet:
              path: /products
              port: 5002
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /products
              port: 5002
            initialDelaySeconds: 5
            periodSeconds: 5